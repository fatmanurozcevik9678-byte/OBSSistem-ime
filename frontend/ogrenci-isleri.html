<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Teknik Üniversitesi | Öğrenci İşleri Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --navy: #0a1f44;
            --gold: #ffc107;
            --gold-dim: rgba(255,193,7,0.15);
            --cream: #eef2f7;
            --cream-dark: #dce2eb;
            --text: #0d1b2a;
            --muted: #7a93a8;
            --white: #fff;
            --red: #dc2626;
            --red-dim: rgba(220,38,38,0.1);
            --green: #16a34a;
            --blue: #2563eb;
            --blue-dim: rgba(37,99,235,0.1);
            --shadow: 0 20px 60px rgba(10,31,68,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        
        .header {
            background: var(--navy);
            border-radius: 20px;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header h1 {
            font-size: 1.3rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 i { color: var(--gold); }
        .user-info { color: white; font-size: 0.8rem; }
        .logout-btn {
            background: rgba(255,193,7,0.15);
            border: 1px solid rgba(255,193,7,0.3);
            color: var(--gold);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .logout-btn:hover { background: var(--gold); color: var(--navy); }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            background: var(--gold-dim);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.2rem;
        }
        .stat-info h3 { font-size: 1.8rem; font-weight: 700; color: var(--text); }
        .stat-info p { font-size: 0.75rem; color: var(--muted); }
        
        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1.5px solid var(--cream-dark);
            border-radius: 40px;
        }
        .btn-add {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .table-wrapper {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: var(--shadow);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 1rem;
            background: var(--cream);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            border-bottom: 2px solid var(--cream-dark);
        }
        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--cream-dark);
            font-size: 0.85rem;
        }
        tr:hover { background: var(--cream); }
        .action-btns { display: flex; gap: 8px; }
        .edit-btn {
            background: var(--blue-dim);
            color: var(--blue);
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .delete-btn {
            background: var(--red-dim);
            color: var(--red);
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .edit-btn:hover { background: var(--blue); color: white; }
        .delete-btn:hover { background: var(--red); color: white; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 1rem; color: var(--text); }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            border: 1.5px solid var(--cream-dark);
            border-radius: 10px;
        }
        .modal-content button {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .save-btn { background: var(--navy); color: white; width: 100%; margin-bottom: 0.5rem; }
        .cancel-btn { background: var(--cream-dark); width: 100%; }
        .delete-confirm-btn { background: var(--red); color: white; width: 100%; margin-bottom: 0.5rem; }
        
        @media (max-width: 700px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; text-align: center; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-building-columns"></i> Öğrenci İşleri Daire Başkanlığı</h1>
        <div>
            <span class="user-info" id="userInfo"></span>
            <button class="logout-btn" onclick="cikis()"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-user-graduate"></i></div>
            <div class="stat-info">
                <h3 id="toplamOgrenci">0</h3>
                <p>Toplam Öğrenci</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chalkboard-user"></i></div>
            <div class="stat-info">
                <h3 id="toplamBolum">8</h3>
                <p>Bölüm</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-info">
                <h3 id="ortalamaGno">0</h3>
                <p>Ortalama GNO</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <div class="stat-info">
                <h3 id="aktifOgrenci">0</h3>
                <p>Aktif Öğrenci</p>
            </div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="İsim veya numara ile ara..." onkeyup="tabloGoster()">
        <button class="btn-add" onclick="yeniOgrenciModal()"><i class="fas fa-plus"></i> Yeni Öğrenci</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>No</th><th>Ad Soyad</th><th>Bölüm</th><th>Sınıf</th><th>GNO</th><th>Devamsızlık</th><th>Durum</th><th>İşlemler</th></tr>
            </thead>
            <tbody id="ogrenciTbody"></tbody>
        </table>
    </div>
</div>

<!-- Öğrenci Ekle/Düzenle Modal -->
<div class="modal" id="ogrenciModal">
    <div class="modal-content">
        <h3 id="modalTitle">Yeni Öğrenci Ekle</h3>
        <input type="hidden" id="editNo">
        <input type="text" id="ogrenciAd" placeholder="Ad Soyad">
        <select id="ogrenciBolum">
            <option value="Bilgisayar Programcılığı">Bilgisayar Programcılığı</option>
            <option value="Web Tasarımı">Web Tasarımı</option>
            <option value="Yapay Zeka">Yapay Zeka</option>
            <option value="Mobil Uygulama">Mobil Uygulama</option>
            <option value="Ağ Sistemleri">Ağ Sistemleri</option>
            <option value="Siber Güvenlik">Siber Güvenlik</option>
            <option value="Oyun Geliştirme">Oyun Geliştirme</option>
            <option value="Veri Bilimi">Veri Bilimi</option>
        </select>
        <select id="ogrenciSinif">
            <option value="1. Sınıf">1. Sınıf</option>
            <option value="2. Sınıf">2. Sınıf</option>
            <option value="3. Sınıf">3. Sınıf</option>
            <option value="4. Sınıf">4. Sınıf</option>
        </select>
        <button class="save-btn" onclick="kaydetOgrenci()"><i class="fas fa-save"></i> Kaydet</button>
        <button class="cancel-btn" onclick="closeModal()">İptal</button>
    </div>
</div>

<!-- Silme Onay Modal -->
<div class="modal" id="silModal">
    <div class="modal-content">
        <h3><i class="fas fa-trash"></i> Öğrenci Sil</h3>
        <p id="silMesaj">Bu öğrenciyi silmek istediğinize emin misiniz?</p>
        <button class="delete-confirm-btn" onclick="silOnayla()"><i class="fas fa-check"></i> Evet, Sil</button>
        <button class="cancel-btn" onclick="closeSilModal()">İptal</button>
    </div>
</div>

<script>
    function cikis() {
        sessionStorage.removeItem('obs_user');
        window.location.href = 'index.html';
    }

    let currentUser = JSON.parse(sessionStorage.getItem('obs_user') || '{}');
    if (!currentUser || currentUser.rol !== 'memur') {
        window.location.href = 'index.html';
    }

    document.getElementById('userInfo').innerHTML = `<i class="fas fa-user-check"></i> ${currentUser.ad} ${currentUser.soyad} | Öğrenci İşleri`;

    let tumOgrenciler = JSON.parse(localStorage.getItem('MÜOS_Sunucu_Ogrenciler') || '[]');
    let silinecekNo = null;
    
    function istatistikleriGuncelle() {
        let aktifler = tumOgrenciler.filter(o => o.aktif !== false);
        let toplamGno = 0;
        for (let i = 0; i < tumOgrenciler.length; i++) {
            toplamGno += parseFloat(tumOgrenciler[i].gno);
        }
        document.getElementById('toplamOgrenci').innerText = tumOgrenciler.length;
        document.getElementById('aktifOgrenci').innerText = aktifler.length;
        document.getElementById('ortalamaGno').innerText = (toplamGno / tumOgrenciler.length).toFixed(2);
    }
    
    function tabloGoster() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const filtered = [];
        for (let i = 0; i < tumOgrenciler.length; i++) {
            let o = tumOgrenciler[i];
            if (o.tamAd.toLowerCase().includes(searchText) || o.no.toString().includes(searchText)) {
                filtered.push(o);
            }
        }
        
        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            let o = filtered[i];
            let durumText = o.aktif !== false ? '<span style="color:var(--green)">✓ Aktif</span>' : '<span style="color:var(--red)">✗ Pasif</span>';
            html += '<tr>' +
                '<td>' + o.no + '</td>' +
                '<td>' + o.tamAd + '</td>' +
                '<td>' + o.bolum + '</td>' +
                '<td>' + o.sinif + '</td>' +
                '<td>' + o.gno + '</td>' +
                '<td>' + (o.devam || 0) + '/42</td>' +
                '<td>' + durumText + '</td>' +
                '<td class="action-btns">' +
                    '<button class="edit-btn" onclick="duzenleOgrenci(' + o.no + ')"><i class="fas fa-edit"></i> Düzenle</button>' +
                    '<button class="delete-btn" onclick="silOgrenci(' + o.no + ')"><i class="fas fa-trash"></i> Sil</button>' +
                '</td>' +
                '</tr>';
        }
        document.getElementById('ogrenciTbody').innerHTML = html;
        istatistikleriGuncelle();
    }
    
    function yeniOgrenciModal() {
        document.getElementById('modalTitle').innerText = 'Yeni Öğrenci Ekle';
        document.getElementById('editNo').value = '';
        document.getElementById('ogrenciAd').value = '';
        document.getElementById('ogrenciBolum').value = 'Bilgisayar Programcılığı';
        document.getElementById('ogrenciSinif').value = '1. Sınıf';
        document.getElementById('ogrenciModal').classList.add('open');
    }
    
    function duzenleOgrenci(no) {
        let ogr = null;
        for (let i = 0; i < tumOgrenciler.length; i++) {
            if (tumOgrenciler[i].no === no) {
                ogr = tumOgrenciler[i];
                break;
            }
        }
        if (ogr) {
            document.getElementById('modalTitle').innerText = 'Öğrenci Düzenle';
            document.getElementById('editNo').value = ogr.no;
            document.getElementById('ogrenciAd').value = ogr.tamAd;
            document.getElementById('ogrenciBolum').value = ogr.bolum;
            document.getElementById('ogrenciSinif').value = ogr.sinif;
            document.getElementById('ogrenciModal').classList.add('open');
        }
    }
    
    async function kaydetOgrenci() {
        const no = document.getElementById('editNo').value;
        const ad = document.getElementById('ogrenciAd').value.trim();
        const bolum = document.getElementById('ogrenciBolum').value;
        const sinif = document.getElementById('ogrenciSinif').value;
        
        if (!ad) { alert("Ad Soyad giriniz!"); return; }
        
        if (no) {
            for (let i = 0; i < tumOgrenciler.length; i++) {
                if (tumOgrenciler[i].no == no) {
                    tumOgrenciler[i].tamAd = ad;
                    tumOgrenciler[i].bolum = bolum;
                    tumOgrenciler[i].sinif = sinif;
                    break;
                }
            }
        } else {
            let maxNo = 1001;
            for (let i = 0; i < tumOgrenciler.length; i++) {
                if (tumOgrenciler[i].no > maxNo) maxNo = tumOgrenciler[i].no;
            }
            let yeniNo = maxNo + 1;
            const defaultHash = await hashSifre("1234");
            tumOgrenciler.push({
                no: yeniNo,
                tamAd: ad,
                bolum: bolum,
                sinif: sinif,
                gno: "2.00",
                devam: 0,
                aktif: true,
                fakulte: "Teknoloji Fakültesi",
                uni: "Nova Teknik Üniversitesi",
                Sifre: defaultHash
            });
        }
        
        localStorage.setItem('MÜOS_Sunucu_Ogrenciler', JSON.stringify(tumOgrenciler));
        closeModal();
        tabloGoster();
    }
    
    function silOgrenci(no) {
        let ogr = null;
        for (let i = 0; i < tumOgrenciler.length; i++) {
            if (tumOgrenciler[i].no === no) {
                ogr = tumOgrenciler[i];
                break;
            }
        }
        if (ogr) {
            silinecekNo = no;
            document.getElementById('silMesaj').innerHTML = '<strong>' + ogr.tamAd + '</strong> (No: ' + ogr.no + ') adlı öğrenciyi silmek istediğinize emin misiniz?';
            document.getElementById('silModal').classList.add('open');
        }
    }
    
    function silOnayla() {
        let yeniListe = [];
        for (let i = 0; i < tumOgrenciler.length; i++) {
            if (tumOgrenciler[i].no !== silinecekNo) {
                yeniListe.push(tumOgrenciler[i]);
            }
        }
        tumOgrenciler = yeniListe;
        localStorage.setItem('MÜOS_Sunucu_Ogrenciler', JSON.stringify(tumOgrenciler));
        closeSilModal();
        tabloGoster();
    }
    
    function closeModal() {
        document.getElementById('ogrenciModal').classList.remove('open');
    }
    
    function closeSilModal() {
        document.getElementById('silModal').classList.remove('open');
        silinecekNo = null;
    }
    
    async function hashSifre(sifre) {
        const encoder = new TextEncoder();
        const data = encoder.encode(sifre);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
    }
    
    tabloGoster();
</script>
</body>
</html>
