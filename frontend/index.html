<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Teknik Üniversitesi | Öğrenci Bilgi Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --navy: #0a1f44;
            --gold: #ffc107;
            --gold-dim: rgba(255,193,7,0.15);
            --cream: #eef2f7;
            --cream-dark: #dce2eb;
            --text: #0d1b2a;
            --muted: #7a93a8;
            --white: #fff;
            --shadow: 0 20px 60px rgba(10,31,68,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .shell {
            display: grid;
            grid-template-columns: 400px 1fr;
            max-width: 1000px;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            animation: up .5s ease;
        }
        @keyframes up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .left {
            background: var(--navy);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .crest {
            width: 50px; height: 50px;
            background: var(--gold-dim);
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .crest i { color: var(--gold); font-size: 1.2rem; }
        .univ-label { font-size: .7rem; color: var(--gold); letter-spacing: 2px; margin-bottom: .4rem; }
        .univ-name { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: .7rem; }
        .univ-sub { font-size: .8rem; color: rgba(255,255,255,.5); }
        .type-tabs {
            display: flex;
            gap: .3rem;
            margin-bottom: 1.2rem;
            background: rgba(255,255,255,.06);
            padding: 3px;
            border-radius: 10px;
        }
        .ttab {
            flex: 1;
            font-size: .7rem;
            font-weight: 600;
            color: rgba(255,255,255,.4);
            background: transparent;
            border: none;
            padding: .5rem;
            border-radius: 7px;
            cursor: pointer;
        }
        .ttab.active {
            background: rgba(255,193,7,0.2);
            color: var(--gold);
        }
        .flabel {
            font-size: .7rem;
            color: rgba(255,255,255,.4);
            display: block;
            margin-bottom: .4rem;
            letter-spacing: 1px;
        }
        .finput-w {
            position: relative;
            margin-bottom: 1rem;
        }
        .finput-w i {
            position: absolute;
            left: .9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }
        .finput {
            width: 100%;
            padding: .75rem 1rem .75rem 2.4rem;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }
        .finput:focus { border-color: rgba(255,193,7,0.5); }
        .login-btn {
            width: 100%;
            padding: .8rem;
            background: var(--gold);
            color: var(--navy);
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: .5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

        .login-btn:hover { background: #e0a800; }

            gap: 6px;

            background: rgba(255,193,7,0.1);
            border-radius: 40px;
            font-size: .7rem;
            color: rgba(255,193,7,0.8);
            margin-top: 1rem;

        }

            border-radius: 40px;

        .ann-item {
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s ease;

            justify-content: center;
            font-size: 1.1rem;

            border-radius: 6px; 
            font-weight: 700;
            letter-spacing: 0.5px;
        }

            border-radius: 4px;
            font-weight: 800;
            animation: pulse 2s infinite;

            50% { opacity: 0.7; }
            100% { opacity: 1; }

        .ann-icon-wrap.cat-uyari { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .cat-akademik { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

        .cat-idari { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }

        .modal {

            position: fixed;
            inset: 0;
            background: rgba(10, 31, 68, 0.6);
            backdrop-filter: blur(5px);

        .m-meta { display: flex; justify-content: center; gap: 15px; font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--cream-dark); }
        .m-text { color: #4a5568; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; text-align: center; }
        .mbox-form { padding: 2rem; text-align: center; }
        .mbox-icon { width: 60px; height: 60px; background: var(--gold-dim); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 1.5rem; }
        .mbox-form h3 { font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 0.5rem; }
        .mbox-form p { font-size: 0.9rem; color: var(--muted); margin-bottom: 1.5rem; }
        .minput-w { position: relative; margin-bottom: 1.5rem; }
        .minput-w i { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .minput { width: 100%; padding: 1rem 1rem 1rem 2.8rem; border: 2px solid var(--cream-dark); border-radius: 12px; font-size: 0.95rem; outline: none; transition: all 0.2s; color: var(--navy); font-weight: 500; }
        .minput:focus { border-color: var(--gold); box-shadow: 0 0 0 4px var(--gold-dim); }
        .m-buttons { display: flex; flex-direction: column; gap: 10px; }
        .btn-primary { background: var(--gold); color: var(--navy); border: none; padding: 0.9rem; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .btn-secondary:hover { background: var(--cream-dark); }
        @media (max-width: 780px) { .shell { grid-template-columns: 1fr; } }
    </style>
</head>

<script>
async function hashSifre(sifre) {
    const encoder = new TextEncoder();
    const data = encoder.encode(sifre);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
}

const erkekIsim = ["Ahmet","Mehmet","Ali","Mustafa","Hasan","Emre","Burak","Can"];

for(let i=1001; i<=1080; i++) {

window.openDuyuru = function(id){
    const d=duyurular.find(x=>x.id===id);
    document.getElementById('annMTitle').innerText=d.baslik;
    document.getElementById('annMBody').innerText=d.icerik;
    document.getElementById('annMDate').innerText=d.tarih;
    
    const banner = document.getElementById('annMBanner');
    banner.className = 'm-header-banner cat-' + d.kategori;
    
    document.getElementById('annMIcon').className = d.icon;
    
    const tag = document.getElementById('annMTag');
    tag.innerText = d.kategori.toUpperCase();
    tag.style.color = 'inherit';
    
    openModal('annModal');
}

window.openModal = function(id){ document.getElementById(id).classList.add('open'); }
window.closeModal = function(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

let aktifTip='ogrenci';
window.setTip = function(tip,btn){
    aktifTip=tip;
    document.querySelectorAll('.ttab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

    if(isNaN(no)){ alert("Geçerli numara girin!"); return; }

    if(aktifTip === 'ogrenci'){
        const ogr = JSON.parse(localStorage.getItem('MÜOS_Sunucu_Ogrenciler')).find(o=>o.no===no);
        if(ogr){
            if(ogr.Sifre !== await hashSifre(sifre)){ alert("Şifre hatalı! (1234)"); return; }
            sessionStorage.setItem('obs_user', JSON.stringify({rol:'ogrenci', no, tamAd:ogr.tamAd, bolum:ogr.bolum, gno:ogr.gno, sinif:ogr.sinif}));
            window.location.href='ogrenci.html';
        } else alert("Öğrenci bulunamadı! (1001-1080)");
    }
    else if(aktifTip === 'ogretmen'){
        if(no<2001||no>2002){ alert("Geçersiz öğretmen no! (2001-2002)"); return; }
        const hoca = JSON.parse(localStorage.getItem('MÜOS_Sunucu_Ogretmenler')).find(h=>h.no===no);
        if(hoca && hoca.Sifre === await hashSifre(sifre)){
            sessionStorage.setItem('obs_user', JSON.stringify({rol:'hoca', no, ad:hoca.ad, soyad:hoca.soyad, unvan:hoca.unvan, bolum:hoca.bolum}));
            window.location.href='ogretmen.html';
        } else alert("Şifre hatalı! (5678)");
    }
    else if(aktifTip === 'isler'){
        if(no<3001||no>3001){ alert("Geçersiz numara! (3001)"); return; }
        const memur = JSON.parse(localStorage.getItem('MÜOS_Sunucu_Memurlar')).find(m=>m.no===no);
        if(memur && memur.Sifre === await hashSifre(sifre)){
            sessionStorage.setItem('obs_user', JSON.stringify({rol:'memur', no, ad:memur.ad, soyad:memur.soyad, birim:memur.birim}));
            window.location.href='ogrenci-isleri.html';
        } else alert("Şifre hatalı! (4567)");
    }
};

document.getElementById('resetBtn').onclick = async () => {
    const n = parseInt(document.getElementById('forgotNo').value);
    if(n>=1001 && n<=1080){
        const ogr = JSON.parse(localStorage.getItem('MÜOS_Sunucu_Ogrenciler')).find(o=>o.no===n);
        if(ogr){
            ogr.Sifre = await hashSifre("1234");
            localStorage.setItem('MÜOS_Sunucu_Ogrenciler', JSON.stringify(JSON.parse(localStorage.getItem('MÜOS_Sunucu_Ogrenciler')).map(o=>o.no===n?ogr:o)));
            alert(n+" numaralı öğrenciye geçici şifre (1234) gönderildi.");
            closeModal('forgotModal');
        }
    } else alert("Geçersiz numara!");
};

['loginNo','loginSifre'].forEach(id=>{
    document.getElementById(id).addEventListener('keypress',e=>{
        if(e.key==='Enter') document.getElementById('loginBtn').click();
    });
});
</script>
