        body {

            background: var(--cream);

            padding: 2rem 1rem;
        }

            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 0% 0%, rgba(10, 31, 68, 0.06), transparent 60%),

            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--shadow);
            animation: up 0.5s ease both;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 2px solid var(--cream);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .title-block h2 {
            font-size: 1.6rem;
            color: var(--navy);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .title-block h2 i { color: var(--gold); }
        .title-block p { font-size: .88rem; color: var(--muted); margin-top: .3rem; }

        .back-btn {
            padding: .6rem 1.2rem;
            background: var(--navy);
            color: var(--white);
            font-size: .85rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: .2s;
        }
        .back-btn:hover { background: #132e5c; transform: translateX(-2px); }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: var(--cream);
            padding: 1rem;
            border-radius: 16px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .filter-group label {
            font-weight: 600;
            color: var(--navy);
        }
        select {
            padding: 0.5rem 1rem;
            border: 1.5px solid var(--cream-dark);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            background: white;
            cursor: pointer;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--cream-dark);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
            min-width: 800px;
        }
        th {
            background: var(--navy);
            color: var(--white);
            font-weight: 600;
            padding: 1rem;
            text-align: center;
        }
        td {
            padding: 1rem 0.8rem;
            border-bottom: 1px solid var(--cream);
            vertical-align: top;
        }
        tr:hover td { background: rgba(238, 242, 247, 0.4); }
        .break-row { text-align: center; background: var(--cream); padding: 0.5rem; font-weight: 600; color: var(--muted); }
        .time-slot { font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 6px; }
        .lesson-box {
            background: var(--cream);
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            border-left: 4px solid var(--navy);
        }
        .lesson-name { font-weight: 600; font-size: .85rem; }
        .lesson-meta { font-size: .7rem; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
        .lesson-meta span i { margin-right: 2px; }
        .empty-slot { color: var(--muted); font-style: italic; padding-top: 0.5rem; }

        @media (max-width: 768px) {

            .header { flex-direction: column; align-items: flex-start; }

        }

</head>

    function getProgram(bolum, sinif) {
        const key = `${bolum}_${sinif}`;
        return dersProgramlari[key] || {};
    }

    function renderProgram() {
        const bolum = document.getElementById('bolumSelect').value;
        const sinif = document.getElementById('sinifSelect').value;
        const program = getProgram(bolum, sinif);
        
        let html = '';
        for (let i = 0; i < saatler.length; i++) {
            const saat = saatler[i];
            const dersler = program[saat] || {};
            
            if (saat === "12:15-13:30") {
                html += `<tr class="break-row"><td colspan="6"><i class="fas fa-utensils"></i> ÖĞLE ARASI (12:15 - 13:30)</td></tr>`;
                continue;
            }
            
            html += `<tr>`;
            html += `<td class="time-slot"><i class="far fa-clock"></i> ${saat}</td>`;
            
            for (let j = 0; j < gunler.length; j++) {
                const gun = gunler[j];
                const ders = dersler[gun] || "Boş";
                
                if (ders === "Boş") {
                    html += `<td><div class="empty-slot">─ Boş Seans ─</div></td>`;
                } else {
                    let dersAd = ders;
                    let ogretmen = "";
                    let salon = "";
                    if (ders.includes("(")) {
                        const parca1 = ders.split("(");
                        dersAd = parca1[0].trim();
                        const kalan = parca1[1].split(")");
                        ogretmen = kalan[0];
                        if (kalan[1]) salon = kalan[1].trim();
                    }
                    html += `<td>
                        <div class="lesson-box">
                            <div class="lesson-name">${dersAd}</div>
                            <div class="lesson-meta">
                                ${ogretmen ? `<span><i class="fas fa-user-tie"></i> ${ogretmen}</span>` : ''}
                                ${salon ? `<span><i class="fas fa-door-open"></i> ${salon}</span>` : ''}
                            </div>
                        </div>
                    </td>`;
                }
            }
            html += `</tr>`;
        }
        
        document.getElementById('programBody').innerHTML = html;
    }

    document.getElementById('bolumSelect').addEventListener('change', renderProgram);
    document.getElementById('sinifSelect').addEventListener('change', renderProgram);
    
    renderProgram();
</script>
